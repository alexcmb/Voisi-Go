name: CI

on:
  push:
    branches: 
      - main
      - 'feature/**'
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend — lint · tests · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # On supprime le lock avant l'install pour contourner le bug npm des
      # dépendances optionnelles de Rollup (@rollup/rollup-linux-x64-gnu) :
      # npm re-résout alors et télécharge le binaire natif du runner Linux.
      - name: Install
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Lint (ESLint)
        run: npm run lint
      - name: Tests unitaires (Vitest)
        run: npm test
      - name: Build (tsc + Vite)
        run: npm run build
      - name: Vérifier la taille du bundle
        run: npx size-limit
      - name: FinOps — taille bundle (raw)
        run: du -sh dist/assets
      - name: FinOps — détail assets
        run: |
          echo "Top 20 fichiers les plus lourds"
          find dist/assets -type f -exec ls -lh {} \; | sort -k5 -hr | head -20
      - name: FinOps — dépendances frontend
        run: npm ls --prod --depth=0

  backend:
    name: Backend — types · tests · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Lint (ESLint)
        run: npm run lint
      - name: Tests unitaires (Vitest)
        run: npm test
      - name: Build (tsc)
        run: npm run build
      - name: FinOps — dépendances backend
        run: npm ls --prod --depth=0
      - name: FinOps — taille backend build
        run: du -sh dist || true