name: Android APK

on:
  push:
    branches:
      - 'feature/apk'
  workflow_dispatch: {} # build manuel à la demande (onglet Actions → Run workflow)

permissions:
  contents: read

jobs:
  build-apk:
    name: Build APK (Capacitor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      # VITE_API_URL est injecté dans le build → l'APK pointe vers le backend Railway.
      # À définir dans : Settings → Secrets and variables → Actions → New secret.
      - name: Build web (Vite)
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Préparer le projet Android (Capacitor)
        run: |
          if [ -d android ]; then
            npx cap sync android
          else
            npx cap add android
            npx cap sync android
          fi

      - name: Build APK (debug)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voisigo-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
